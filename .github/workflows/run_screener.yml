name: Daily Stock Screener

on:
  schedule:
    # എല്ലാ ദിവസവും രാവിലെ ഇന്ത്യൻ സമയം 8:30-ന് തനിയെ റൺ ആകാൻ (UTC 3:00 AM)
    - cron: '0 3 * * *'
  workflow_dispatch: # നമുക്ക് വേണമെന്നുള്ളപ്പോൾ മാനുവലായി റൺ ചെയ്യാനും

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Screener Script
      run: python screener.py
